<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapShorts — Flic Button Shortcut Remote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            color: #1d1d1f;
            background: #f5f5f7;
            line-height: 1.6;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        .hero {
            text-align: center;
            margin-bottom: 48px;
        }
        .hero h1 {
            font-size: 2.4em;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .hero p {
            font-size: 1.1em;
            color: #6e6e73;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px 24px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .card h2 {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card p {
            font-size: 0.95em;
            color: #6e6e73;
        }
        .footer {
            text-align: center;
            margin-top: 48px;
            font-size: 0.85em;
            color: #86868b;
        }
        .footer a {
            color: #86868b;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>TapShorts</h1>
            <p>Turn your Flic button into a shortcut remote.</p>
        </div>

        <div class="cards">
            <a class="card" href="privacy.html">

            </a>

        </div>

        <div class="footer">
